<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags em HTML</title>
</head>
<body>
    <h1>Tags em HTML5</h1>
    <p>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse<br> sobre os termos para descobrir qual tag deverá utilizar em casa caso.</p>

    <ul type="square">
        <li><u title="Use a tag &lt; p &gt;">Parágrafos</u>
        <li><u title="Use a tag &lt; h1 &gt; ">Títulos</u>
        <li><u title="Use a tag &lt; img &gt; ">Imagens</u>
        <li><u title="Use a tag &lt; abbr &gt; ">Abrevições</u>
        <li><u title="Use a tag &lt; code &gt; ">Códigos-fonte</u>
        <li><u title="Use a tag &lt; ol &gt; ">Listas numeradas</u>
        <li><u title="Use a tag &lt; ul &gt; ">Listas com demarcadores</u>
    </ul>
</body>
</html>
